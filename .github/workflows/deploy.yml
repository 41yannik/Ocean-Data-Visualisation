name: Deploy to GitHub Pages

# Baut die Vite-App in app/ und veröffentlicht app/dist auf GitHub Pages.
# Custom-Domain: ozeanvisualisierung.yannik-h-huber.de (siehe app/public/CNAME).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Pages-Deploy gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build:public
        env:
          VITE_DATA_VARIANT: challenge
          VITE_PUBLIC_BUILD: "1"
          VITE_COMMIT_SHA: ${{ github.sha }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
