<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacific Cyclones &amp; Their Impacts</title>
  </head>
  <body>
    <div class="scrolly">
      <div class="sticky">
        <canvas id="globe"></canvas>

        <div class="title-card">
          <h1>Pacific Cyclones<br />&amp; Their Impacts</h1>
          <p class="scroll-hint">drag to spin · scroll to explore ↓</p>
        </div>

        <aside id="legend" class="legend" aria-label="Legend"></aside>

        <div id="controls" class="controls" aria-label="Time controls"></div>
      </div>

      <div id="steps" class="steps"></div>
    </div>

    <footer class="credits">
      Data: NOAA IBTrACS (storm tracks) · Pacific Data Hub / UN OCHA (people affected) · world-atlas.
      Built with D3 (colours: ColorBrewer).
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
