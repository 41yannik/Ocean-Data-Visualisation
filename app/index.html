<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacific Cyclones &amp; Their Impacts</title>
  </head>
  <body>
    <div class="scrolly">
      <div class="sticky">
        <canvas id="globe"></canvas>

        <div class="title-card">
          <h1>Pacific Cyclones<br />&amp; Their Impacts</h1>
          <p class="scroll-hint">scroll to explore ↓</p>
        </div>

        <div class="legend" aria-label="Storm category legend">
          <span class="legend__title">Storm strength</span>
          <span class="legend__scale">
            <i style="background:#74add1"></i><i style="background:#fee090"></i><i style="background:#fdae61"></i><i style="background:#f46d43"></i><i style="background:#d73027"></i><i style="background:#a50026"></i>
          </span>
          <span class="legend__ends"><span>Tropical storm</span><span>Category 5</span></span>
          <span class="legend__impact"><i class="halo"></i> circle = people affected</span>
        </div>
      </div>

      <div id="steps" class="steps"></div>
    </div>

    <footer class="credits">
      Data: NOAA IBTrACS (storm tracks) · Pacific Data Hub / UN OCHA (people affected) · world-atlas.
      Visualisation in D3.
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
